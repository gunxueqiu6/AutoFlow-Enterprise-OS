version: '3.8'

services:
  # --- 数据库与基础设施 ---
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-backup:/backup
    networks:
      - ai-platform-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.11.4
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__HTTPS: "true"
    networks:
      - ai-platform-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.0-alpine
    container_name: redis
    restart: always
    networks:
      - ai-platform-net
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- AI能力服务 ---
  paddleocr:
    image: registry.baidubce.com/paddlepaddle/paddleocr:latest
    container_name: paddleocr
    restart: always
    ports:
      - "8081:8081"
    command: ["python3", "/PaddleOCR/deploy/hubserving/ocr_system/module.py", "--port=8081"]
    networks:
      - ai-platform-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  whisper-cpp:
    image: ghcr.io/ggerganov/whisper.cpp:main
    container_name: whisper-cpp
    restart: always
    ports:
      - "8082:8082"
    command: ["/bin/sh", "-c", "cd examples/server && ./server -m /models/ggml-base.en.bin --port 8082"]
    volumes:
      - ./models:/models
    networks:
      - ai-platform-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- 业务微服务 ---
  gateway:
    build: ./services/gateway
    container_name: gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - agent-dispatcher
    networks:
      - ai-platform-net
    volumes:
      - ./certs:/etc/nginx/certs
    environment:
      - HTTPS_ENABLED=true
      - SSL_CERT_PATH=/etc/nginx/certs/fullchain.pem
      - SSL_KEY_PATH=/etc/nginx/certs/privkey.pem
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-dispatcher:
    build: ./services/agent-dispatcher
    container_name: agent-dispatcher
    restart: always
    depends_on:
      - postgres
      - qdrant
      - redis
      - paddleocr
      - whisper-cpp
    networks:
      - ai-platform-net
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  procurement-service:
    build: ./services/procurement-service
    container_name: procurement-service
    restart: always
    depends_on:
      - postgres
      - rpa-executor
    networks:
      - ai-platform-net
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    restart: always
    depends_on:
      - postgres
    networks:
      - ai-platform-net
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  rpa-executor:
    build: ./services/rpa-executor
    container_name: rpa-executor
    restart: always
    privileged: true
    networks:
      - ai-platform-net
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- 监控服务 ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - ai-platform-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - ai-platform-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}

volumes:
  postgres-data:
  qdrant-data:
  prometheus-data:
  grafana-data:

networks:
  ai-platform-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16